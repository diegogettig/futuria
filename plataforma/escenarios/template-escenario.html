<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <meta name="description" content="{{description}}">
  <style>
    :root {
      --bg: #06060a;
      --fg: #e8e8ec;
      --muted: #9a9aa3;
      --accent: #ff5230;
      --surface: #0e0e14;
      --border: rgba(255,255,255,0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg);
      color: var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.7;
    }
    a { color: #ff7a5c; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .wrap { max-width: 860px; margin: 0 auto; padding: 48px 24px 80px; }
    .meta { color: var(--muted); font-size: 0.9rem; margin-bottom: 8px; }
    h1 { font-size: 2.4rem; line-height: 1.15; margin: 8px 0 18px; }
    .pill { display: inline-block; padding: 4px 10px; border-radius: 999px; background: rgba(255,82,48,0.15); color: var(--accent); font-weight: 600; font-size: 0.8rem; letter-spacing: 0.04em; text-transform: uppercase; }
    h2 { font-size: 1.35rem; margin: 36px 0 10px; }
    h3 { font-size: 1.1rem; margin: 24px 0 8px; color: #fff; }
    p, li { color: #d6d6de; }
    ul, ol { padding-left: 22px; margin: 10px 0 16px; }
    table { width: 100%; border-collapse: collapse; margin: 12px 0 18px; font-size: 0.95rem; }
    th, td { border: 1px solid var(--border); padding: 10px 12px; text-align: left; vertical-align: top; }
    th { background: var(--surface); color: var(--fg); }
    tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
    code { background: var(--surface); padding: 2px 6px; border-radius: 6px; font-size: 0.9em; color: #ffb8a8; }
    blockquote { border-left: 3px solid var(--accent); padding: 6px 14px; color: #c9c9d1; background: rgba(255,82,48,0.06); margin: 14px 0; }
    .back { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 24px; color: var(--muted); font-size: 0.9rem; }
    .back:hover { color: var(--fg); text-decoration: none; }
    .hr { border: 0; border-top: 1px solid var(--border); margin: 28px 0; }
    .footer { margin-top: 40px; color: var(--muted); font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/index.html">← Volver a FUTURIA</a>
    <div class="pill">Escenario PRISM</div>
    <div class="meta">{{meta}}</div>
    <h1>{{title}}</h1>
    <div class="hr"></div>
    {{body}}
    <div class="footer">FUTURIA Institute · Instituto Global de Futuros Plausibles</div>
  </div>
</body>
</html>
