      Nature) y leyes reales vigentes (Chile/España/Colorado). Viabilidad técnica 75:
      BCIs en TRL 7-8, decodificación en producción temprana. Compatibilidad social 58:
      entusiasmo por restauración pero rechazo a vigilancia neural; riesgo de aversión
      si hay brechas (factor bloqueo declarado). Precedente histórico 65: analogías
      GDPR, derechos de datos, data trusts abiertos. Convergencia 85: BCI + IA + leyes
      neuroderechos + geopolítica + privacidad actúan en la misma dirección.
      Banda resultante: "Media" (60-74).
